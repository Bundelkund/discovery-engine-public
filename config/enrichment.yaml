enrichment:
  steps:
    - enricher_id: "domain_resolver"
      optional: false
      requires: []
    - enricher_id: "hunter"
      optional: true
      requires: ["domain_resolver"]
      rate_limit:
        requests_per_second: 2
        daily_limit: 500
    - enricher_id: "cvf"
      optional: true
      requires: ["domain_resolver"]
      min_postings: 3
      model: "gpt-4o-mini"
