# Portal Scanner — Demo Configuration
#
# This is a SHIPPED EXAMPLE. The application reads it for the Greenhouse,
# Ashby, Lever, and Personio scrapers. Replace `tracked_companies` with
# your own targets, or — to keep your private list out of git — copy this
# file to `config/portals.local.yaml` and edit there. The application
# prefers `*.local.yaml` if present (see `app/config.resolve_local_override`).
#
# Schema for each entry:
#   - name:         Human-readable company name
#   - careers_url:  Public careers page (used as documentation only)
#   - api:          Greenhouse JSON API URL (greenhouse.io entries only)
#   - scan_method:  "websearch" | absent — used by external portal scanners
#   - scan_query:   Optional search query for websearch scans
#   - notes:        Free-form notes (location, focus areas, …)
#   - enabled:      false to skip without deletion (default true)
#
# Title filter: which titles to keep / drop. Edit to taste.

title_filter:
  positive:
    - "AI"
    - "AI Engineer"
    - "Solutions Engineer"
    - "Solutions Architect"
    - "Forward Deployed"
    - "Applied AI"
  negative:
    - "Junior"
    - "Intern"
    - "Praktikum"
  seniority_boost:
    - "Senior"
    - "Lead"
    - "Manager"

# Demo set — five public AI-native companies with stable ATS endpoints.
# Add your own. Each entry MUST have a careers_url.
tracked_companies:

  - name: Anthropic
    careers_url: https://job-boards.greenhouse.io/anthropic
    api: https://boards-api.greenhouse.io/v1/boards/anthropic/jobs
    notes: "AI safety lab. Greenhouse-hosted board."
    enabled: true

  - name: Vercel
    careers_url: https://job-boards.greenhouse.io/vercel
    api: https://boards-api.greenhouse.io/v1/boards/vercel/jobs
    notes: "Frontend/AI dev tooling."
    enabled: true

  - name: ElevenLabs
    careers_url: https://jobs.ashbyhq.com/elevenlabs
    notes: "Voice AI / TTS. Ashby-hosted board."
    enabled: true

  - name: Mistral AI
    careers_url: https://jobs.lever.co/mistral
    notes: "Open-weights LLM lab. Lever-hosted board."
    enabled: true

  - name: n8n
    careers_url: https://jobs.ashbyhq.com/n8n
    notes: "Workflow automation. Ashby-hosted board."
    enabled: true
