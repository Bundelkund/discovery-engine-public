# Archetype Catalog for Job Scoring
#
# Each archetype defines keywords (DE + EN) that are matched against
# job title + description. Users select archetype weights in their profile
# (e.g. bridge-builder: 0.9, coach: 0.7).
#
# Scoring formula: best_match = max(matches × 40, 100) × user_weight
# More keywords = more matches = higher scores for relevant jobs.
#
# To calibrate: add keywords from actual job titles that should match.
# Use /score/batch to re-score after changes. See docs/SCORING.md.

