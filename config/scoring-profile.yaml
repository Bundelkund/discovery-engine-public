# Default Single-User Scoring Profile
#
# This file is the COMMITTED default. The orchestrator loads it via
# app/config.py::load_scoring_profile() unless a sibling
# `scoring-profile.local.yaml` (gitignored) exists — in which case
# the .local.yaml fully overrides this file (analogous to
# portals.local.yaml).
#
# Why committed: the discovery-engine repo is currently single-tenant
# (Florian, on Coolify). Without a default file, the production
# container had no profile -> `_score_archetypes` early-returned ""
# -> all jobs.archetype rows ended up empty (DE-FOLLOWUP-11). The
# .local.yaml escape hatch remains for any future tenant who needs
# private overrides.
#
# Schema mirrors app/scoring/types.py::ScoringProfile.
# Apply Skill can still write scoring-profile.local.yaml for a tenant
# that prefers Apply-Skill-managed onboarding.

id: "florian"
name: "Florian Rister"

# Archetype weights — keys must exist in config/archetypes.yaml.
# Derived from florian-knowledge ranking-profile.yaml::role_buckets_primary:
#   ai_consultant, ai_trainer, customer_education, agile_coach_ki,
#   data_kompetenz_referent.
# Higher weight = more bonus when title/description matches that
# archetype's keywords. _score_archetypes formula:
#   min(100, matches*40) * weight.
archetypes:
  coach:          0.9   # Agile Coach / Scrum Master / Systemic Coach — core
  trainer:        0.9   # KI-Trainer / AI Workshop / Dozent — core
  enabler:        0.8   # AI Enablement / Customer Education
  change-agent:   0.7   # Change Management / Transformation Lead
  consultant:     0.7   # AI Consultant / KI-Berater
  facilitator:   0.6   # Design Thinking / Workshop-Leiter
  bridge-builder: 0.5   # Solutions Architect / Forward Deployed — tech-adjacent
  strategist:    0.3   # Head of Innovation — less core
  product-lead:  0.2   # AI Product Manager — only loosely relevant

# Title (+15) + description (+5) positive keywords. From
# ranking-profile.yaml::patterns.ai_keywords + coach_keywords.
keywords_positive:
  - "AI"
  - "KI"
  - "GenAI"
  - "LLM"
  - "Generative"
  - "Automation"
  - "Copilot"
  - "Prompt"
  - "Agile"
  - "Coach"
  - "Scrum"
  - "Facilitator"
  - "Trainer"
  - "Enablement"
  - "Change"
  - "Innovation"
  - "Transformation"
  - "Mentor"
  - "Berater"
  - "Consultant"

# Penalty terms. From ranking-profile.yaml::negatives.title_disqual_regex
# + sales_recruiter_regex + absolute_disqual_regex (manually unrolled).
keywords_negative:
  - "Software Engineer"
  - "Backend"
  - "Frontend"
  - "Fullstack"
  - "DevOps"
  - "Developer"
  - "Programmer"
  - "Bauleit"
  - "Maschinenbau"
  - "Erzieher"
  - "Pflege"
  - "Sales"
  - "Vertrieb"
  - "Account Executive"
  - "SDR"
  - "BDR"
  - "Recruiter"
  - "Talent Acquisition"
  - "Customer Success Manager"
  - "Junior"
  - "Werkstudent"
  - "Praktikant"
  - "Annotator"
  - "Data Labeler"

# Seniority defaults — Florians 8+ Jahre Berufserfahrung passt Senior/Lead.
seniority_boost: ["Senior", "Lead", "Head", "Principal"]
seniority_penalty: ["Junior", "Intern", "Trainee", "Werkstudent"]

# Locations — primary Berlin + acceptable DE-cities + Remote.
# Exact match -> 100, remote -> 75, EU/DACH -> 50.
target_locations:
  - "Berlin"
  - "Hamburg"
  - "München"
  - "Munich"
  - "Köln"
  - "Cologne"
  - "Frankfurt"
  - "Stuttgart"
  - "Düsseldorf"
  - "Hannover"
  - "Leipzig"
  - "Bremen"
  - "Remote"

# Heavyweight title matches (primary > secondary). Derived from
# ranking-profile.yaml::patterns.heavyweight_title_regex.
target_roles_primary:
  - "AI Coach"
  - "KI Coach"
  - "Agile Coach"
  - "AI Trainer"
  - "KI Trainer"
  - "AI Consultant"
  - "KI Berater"
  - "AI Berater"
  - "AI Enablement"
  - "AI Enablement Manager"
  - "AI Enablement Lead"
  - "Change Manager"
  - "Innovation Consultant"
  - "Transformation Consultant"
  - "Transformation Manager"
  - "Scrum Master"
  - "Referent Datenkompetenz"
  - "Coach Digitalkompetenz"
  - "New Work Berater"

target_roles_secondary:
  - "Solutions Consultant"
  - "Solutions Architect"
  - "Engineering Manager"
  - "Customer Education"
  - "Curriculum Lead"
  - "Dozent"

# No negative domains for Florian — Source-level Blacklists in
# rank-jobs-fast.sql + sources.yaml handle this layer.
negative_domains: []
