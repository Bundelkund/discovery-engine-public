consumers:
  # Primary consumer for the open-source single-tenant deployment:
  # the Apply Skill (Claude Code workflow at github.com/Bundelkund/apply-skill).
  - id: apply-skill
    name: "Apply Skill"
    key_env: APPLY_API_KEY
    scopes: [jobs:read, scrape:trigger]
    active: true

  # WonderApply integration: activated 2026-05-31 for single-tenant production
  # use (Florian is the sole WA user). Variant C (multi-tenant) is still on the
  # ROADMAP — flip back to active: false when multi-user rollout begins, or
  # replace this consumer with per-user keys once Variant C lands.
  - id: wonderapply
    name: "WonderApply"
    key_env: WA_API_KEY
    scopes: [jobs:read, scrape:trigger]
    active: true

  # JobHunt — same caveat as WonderApply.
  - id: jobhunt
    name: "JobHunt"
    key_env: JH_API_KEY
    scopes: [jobs:read]
    active: false

  # n8n scheduler — triggers POST /scan/{stage} (T8 cc-recheck-cron). Stage B daily
  # revalidate + Stage A monthly discover. jobs:read lets it poll GET /scan/runs.
  # Key value lives in Coolify Env (N8N_API_KEY), NOT in the gitignored .env image.
  - id: n8n
    name: "n8n Scheduler"
    key_env: N8N_API_KEY
    scopes: [scrape:trigger, jobs:read]
    active: true

  # tenant-module — Draht-2 consumer. Person-scoped match-loop fetches GET /jobs
  # (HTTP-only, no SQL join) to score jobs into tenant.matches. Read-only: jobs:read,
  # NO scrape:trigger (tenant never drives discovery). Key value lives in Coolify Env
  # (TENANT_API_KEY) on BOTH sides — engine reads it to validate, tenant sends it as
  # X-API-Key. Verified live 2026-06-08 (matches_upserted 0→2 after E1/E2 ranking fix).
  - id: tenant
    name: "Tenant Module"
    key_env: TENANT_API_KEY
    scopes: [jobs:read]
    active: true
