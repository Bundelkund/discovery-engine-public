# Scoring Configuration
# See docs/SCORING.md for full documentation and calibration guide.
#
# store_threshold: Jobs below this score are discarded (not saved to DB)
# gate_threshold:  Only jobs above this score trigger Stage 2 (expensive embedding)
# weights:         How much each scoring dimension contributes (must sum to ~100)

scoring:
  store_threshold: 40

  stages:
    - scorer_id: "keyword"
      stage: 1
      enabled: true
      weights:
        archetype_match: 40    # Job matches user's chosen archetypes?
        keyword_positive: 30   # Job contains user's desired keywords?
        seniority: 10          # Job matches user's experience level?
        remote_bonus: 5        # Remote/hybrid available?
        noise_penalty: -15     # Job contains user's excluded keywords?

    - scorer_id: "embedding"
      stage: 2
      enabled: true
      gate_threshold: 50       # Only jobs scoring >= 50 in Stage 1
      model: "text-embedding-3-small"
