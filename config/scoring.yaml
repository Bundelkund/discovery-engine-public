# Scoring Configuration
# See docs/SCORING.md for full documentation and calibration guide.
#
# store_threshold: Jobs below this score are discarded (not saved to DB)
# weights:         How much each scoring dimension contributes (must sum to ~100)
#
# Stages 2 (embedding) and 3 (LLM) were removed in bundle-b-phase1.
# Consumer-side scoring will be injected via the Phase 3 Query-API.
#
# threshold=0: store all jobs that pass dedup + DQ. Consumer-side
# ranking (e.g. JobHunt rank-jobs-fast.sql) does the real filtering.
# Stage-1 keyword score with empty profile is always 0, so a non-zero
# threshold here would silently discard everything when no profile_id
# is sent in the /scrape request.

scoring:
  store_threshold: 0

  stages:
    - scorer_id: "keyword"
      stage: 1
      enabled: true
      weights:
        role_match: 25
        archetype_match: 20
        keyword_positive: 15
        location_match: 20
        seniority: 5
        remote_bonus: 5
        noise_penalty: -10
