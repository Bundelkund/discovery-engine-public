# Scoring Configuration
# See docs/SCORING.md for full documentation and calibration guide.
#
# store_threshold: Jobs below this score are discarded (not saved to DB)
# gate_threshold:  Only jobs above this score trigger Stage 2 (expensive embedding)
# weights:         How much each scoring dimension contributes (must sum to ~100)

scoring:
  store_threshold: 40

  stages:
    - scorer_id: "keyword"
      stage: 1
      enabled: true
      weights:
        role_match: 25
        archetype_match: 20
        keyword_positive: 15
        location_match: 20
        seniority: 5
        remote_bonus: 5
        noise_penalty: -10

    - scorer_id: "embedding"
      stage: 2
      enabled: true
      gate_threshold: 50
      model: "text-embedding-3-small"

    - scorer_id: "llm"
      stage: 3
      enabled: true
      gate_threshold: 60
      max_jobs: 30
      model: "claude-haiku-4-5-20251001"
