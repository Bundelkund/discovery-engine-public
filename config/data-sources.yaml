# Discovery Engine — Data Sources Registry
#
# Documents the Python scrapers that feed into the `jobs` table.
# This file is documentation — it is not read by the application.

# === Python Scrapers ===
# Triggered via POST /scrape/{source_id}. Code in app/sources/.

python_scrapers:
  greenhouse:
    module: app.sources.greenhouse
    api: boards-api.greenhouse.io (JSON)
    portals: 27
    notes: "ATS scraper. Triggered via POST /scrape/greenhouse."

  indeed:
    module: app.sources.indeed
    api: python-jobspy (scraping lib)
    notes: "Indeed/Glassdoor/Google scraping via python-jobspy."

  adzuna:
    status: disabled
    module: app.sources.adzuna
    api: Adzuna REST API
    notes: "Needs app_id + app_key from developer.adzuna.com. Broad coverage DE."

  rss:
    module: app.sources.rss
    api: feedparser
    notes: "Feed URLs configured in sources.yaml."

  ashby:
    module: app.sources.ashby
    api: jobs.ashbyhq.com/{company} (JSON)
    portals: 25
    notes: "ATS scraper for Ashby-hosted boards (Cohere, LangChain, DeepL, n8n, ElevenLabs, Lovable, etc.)."

  lever:
    module: app.sources.lever
    api: api.lever.co/v0/postings/{company} (JSON)
    portals: 8
    notes: "ATS scraper for Lever-hosted boards (Mistral AI, Spotify, Palantir, Qonto, etc.)."

  personio:
    module: app.sources.personio
    api: Personio ATS API
    notes: "ATS scraper for Personio-hosted boards."

  recruitee:
    module: app.sources.recruitee
    api: "{slug}.recruitee.com/api/offers (public JSON, no auth)"
    notes: "ATS scraper for Recruitee-hosted boards. Slug from careers_url ending in .recruitee.com."

  breezy:
    module: app.sources.breezy
    api: "{slug}.breezy.hr/json (public JSON list, no auth)"
    notes: "ATS scraper for Breezy.hr-hosted boards. List response has no description field — title/location/url only."

  factorial:
    module: app.sources.factorial
    api: "{slug}.factorialhr.{de|com}/sitemap.xml (no JSON endpoint available)"
    notes: "ATS scraper for Factorial HR career pages. Falls back to sitemap.xml + URL-slug title extraction since Factorial has no public unauthenticated JSON feed. Description empty in v1; enhance via detail-page fetch if needed."
