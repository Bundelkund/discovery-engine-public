minhash:
  threshold: 0.9
  num_perm: 128
  shingle_size: 5
  band_width: 4    # bands = num_perm / band_width = 32; tune alongside threshold

dedup:
  window_days: 42  # retention window for dedup_memory table; entries older than this are purged

rules:
  flag:
    - boilerplate_short
    - no_description
  reject:
    - no_title
    - no_url
  grace_period_days: 7
  activation_file: data/dq_rules_activation.txt
