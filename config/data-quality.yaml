minhash:
  threshold: 0.9
  num_perm: 128
  shingle_size: 5
  band_width: 4    # bands = num_perm / band_width = 32; tune alongside threshold

dedup:
  # Single source of truth for the dedup_memory retention window (days).
  # 10d matches the deployed pg_cron 'dedup-retention-10d' (03:12 UTC), which is the
  # binding purge and keeps the table ~112 MB under the 500 MB cap. The Refine pass's
  # own purge_old() reads this value, so both mechanisms now agree on 10d.
  # (Was 42d in config while the cron already deleted at 10d — config drift resolved.)
  window_days: 10

rules:
  flag:
    - boilerplate_short
    - no_description
  reject:
    - no_title
    - no_url
  grace_period_days: 7
  activation_file: data/dq_rules_activation.txt
