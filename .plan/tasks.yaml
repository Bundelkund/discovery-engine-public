  - id: DE-08
    title: "Culture-Fit Scoring + Initiativbewerbungs-Modus"
    priority: P1
    description: >
      Problem: Die Top-Jobs sind zu technisch/keyword-lastig. Ein Agile Coach
      oder KI-Trainer findet sich nicht in klassischen Stellenanzeigen wieder.
      Der Mehrwert liegt im "Ich löse euer Problem, auch wenn ihr es noch
      nicht in der Ausschreibung habt."

      Zwei neue Scoring-Modi:

      1. CULTURE-FIT SCORER (Stage 1 Erweiterung):
         - Company Values vs. Profil-Werte (aus company_profiles.cvf_scores)
         - Branche/Teamgröße-Match
         - Hiring Signals (wächst das Team? Transformation im Gange?)
         - Scoring-Dimension: culture_fit (10-15% Gewicht)
         - Datenquelle: Company Enrichment (Hunter.io, CVF, LinkedIn)

      2. INITIATIVBEWERBUNGS-DETEKTOR:
         - Erkennt Firmen die KEIN passendes Posting haben, aber:
           a) In einer Transformation stecken (Pressemeldungen, LinkedIn)
           b) AI/Digitalisierung als Thema haben aber keinen Coach/Trainer
           c) Schnell wachsen (Hiring Signal > X)
           d) In der richtigen Branche + Stadt sind
         - Output: "Diese Firma hat kein Posting, aber braucht dich"
         - Datenquellen: company_profiles + Tavily Research + LinkedIn
         - Eigener Endpoint: /discover/opportunities

      3. PROBLEM-SOLVER PROMPT (Stage 3 LLM Erweiterung):
         - Statt "passt dein CV zum JD?" →
           "Welches Problem hat diese Firma, das du lösen kannst?"
         - LLM analysiert: Firma + Branche + Posting →
           formuliert Pitch: "Sie suchen X, aber eigentlich brauchen
           Sie jemanden der Y kann — und das bin ich, weil Z"
         - Speichert: match_pitch (Text) neben match_reasoning

    next_step: >
      Phase 1: Culture-Fit Dimension in Keyword-Scorer (Gewicht aus
      company_profiles). Phase 2: Initiativbewerbungs-Endpoint.
      Phase 3: Problem-Solver Prompt in LLM Scorer.
