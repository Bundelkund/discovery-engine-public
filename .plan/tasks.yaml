  - id: DE-05
    title: JobSpy Worker in Discovery Engine integrieren
    priority: P2
    description: >
      Der jobspy-worker (jobhunt repo, Coolify Port 8082) soll langfristig
      aufgelöst werden. Indeed/Glassdoor/Google-Scraping via python-jobspy
