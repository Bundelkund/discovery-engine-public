  - id: DE-06
    title: Playwright Agents aus CareerOps integrierbar machen
    priority: P2
    description: >
      CareerOps nutzt Playwright via Claude Code MCP Tools (browser_navigate,
      browser_snapshot). Diese Features laufen im User-Browser, nicht headless.
      Herausforderungen:
      - Portal Scanning: Claude navigiert SPAs intelligent → als Service
        müsste das deterministische Extraktion werden oder ein LLM-gesteuerter
        Headless-Browser (z.B. browser-use, AgentQL)
      - Offer Verification: Prüft ob Stelle noch online → als API machbar
      - Apply Mode: Human-in-the-loop, kann nicht automatisiert werden
      - PDF Generation: Lokal, bleibt in CareerOps
      Möglicher Ansatz: Headless Playwright Container mit LLM-Steuerung
      für Portal Scanning + Verification. Apply bleibt in CareerOps.
      Evaluieren: browser-use, Stagehand, AgentQL als Framework.
    research_needed: true

  - id: DE-07
    title: Google Job Search via n8n + Tavily
    priority: P1
    description: >
      Aktiv nach Jobs suchen statt nur Portale zu scrapen.
      Ansätze:
      1. Tavily Search API in n8n → strukturierte Job-Ergebnisse
         Queries: "Agile Coach Berlin", "KI Trainer Berlin",
         "AI Enablement Manager Berlin remote"
      2. Google Jobs API (SerpAPI oder Serper.dev)
      3. Google Custom Search Engine mit site:-Filtern
      Flow: n8n Workflow → Tavily/Serper → Parse → POST /jobs/import
      an Discovery Engine → Scoring Pipeline.
      Braucht: Neuen /jobs/import Endpoint in DE der externe
      Job-Daten entgegennimmt (ohne Scraper-Source).
    next_step: Tavily API Key besorgen, n8n Workflow prototypen

  - id: DE-08
    title: "Tavily Signal-Pipeline — Firmen-Watchlist + Transformation-Erkennung"
    priority: P1
    status: ready
    description: >
      n8n Workflow der täglich 50-100 DACH-Firmen via Tavily durchsucht:
      "{firma} KI Transformation Digitalisierung 2026". Claude klassifiziert
      die Ergebnisse nach Signal-Typ (AI-Strategie=0.9, New Work=0.5,
      Innovation=0.2) und speichert einen transformation_signal_score
      in company_profiles.

      Kein Code in der DE nötig — nur n8n + Tavily + Claude + Supabase.
      Ergebnis: Firmen die gerade in einer AI-Transformation stecken
      werden sichtbar, auch ohne passende Stellenanzeige.
    tech: n8n, Tavily API ($0-20/Monat), Claude Haiku, Supabase
    next_step: Tavily API Key besorgen, n8n Workflow prototypen
    research_source: Deep Research Report 2026-04-11 — Kategorie 4.2

  - id: DE-09
    title: "Kununu Culture-Fit Integration via Apify"
    priority: P1
    status: ready
    description: >
      Kununu-Daten via Apify Actor (radeance/kununu-reviews-scraper)
      für Firmen in der Watchlist holen. Liefert:
      - Kununu-Score (1-5)
      - Culture-Keywords aus Reviews
      - "Happy with wage" Prozent
      - Sentiment-Summary

      Speichern in company_profiles.cvf_scores (JSONB).
      Dann neue Scoring-Dimension culture_fit (10% Gewicht) im
      Keyword-Scorer die company_profiles.cvf_scores gegen
      Profil-Werte matched.

      Apify Free Tier = $5/Monat = ~200 Lookups.
    tech: Apify (kununu-reviews-scraper), Supabase, DE Keyword Scorer
    next_step: Apify Account + Actor testen, company_profiles Schema erweitern
    research_source: Deep Research Report 2026-04-11 — Kategorie 1.4, 3.3

  - id: DE-10
    title: "Problem-Solver Prompt + /discover/opportunities Endpoint"
    priority: P1
    status: blocked
    blocked_by: DE-08, DE-09
    description: >
      Zwei Erweiterungen die auf den Signal- und Culture-Daten aufbauen:

      1. PROBLEM-SOLVER PROMPT (Stage 3 LLM Erweiterung):
         Statt "passt dein CV zum JD?" → "Welches Problem hat diese Firma,
         das du lösen kannst?" Claude analysiert Firma + Branche + Posting
         und formuliert einen Pitch: "Sie suchen X, aber eigentlich brauchen
         Sie jemanden der Y kann — und das bin ich, weil Z."
         Speichert: match_pitch neben match_reasoning.

      2. /discover/opportunities ENDPOINT (Initiativbewerbungs-Detektor):
         Neuer DE-Endpoint der Firmen OHNE passendes Posting rankt:
         - Input: profile_id
         - Logik: company_profiles mit hohem transformation_signal_score
           + gutem culture_fit + passender Branche/Stadt
           MINUS Firmen die schon ein passendes Posting haben
         - Output: Top 10 Firmen mit outreach_hook + best_angle
         - LLM-Prompt: "Braucht {firma} gerade einen {candidate_role}?
           Confidence, Reasoning, Aufhänger für Initiativbewerbung"

      Das ist der Gamechanger: weg von "matche mich gegen JDs" hin zu
      "welche Firma braucht mich, auch wenn sie es noch nicht weiß."
    tech: DE Stage 3 LLM Scorer, FastAPI Endpoint, Supabase
    research_source: Deep Research Report 2026-04-11 — Kategorie 4.1, 4.3
