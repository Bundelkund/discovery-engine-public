  - id: registry-table
    epic: ats-registry
    title: Supabase-Tabelle ats_companies (no-delete Registry)
    status: done
    priority: P1
    depends_on: []
    detail: >
      Additive Migration (migrations/), via supabase-MCP anwenden. Key (ats, slug).
      Spalten: ats, slug, company_name, careers_url, feed_url, source('cc'|'scrape'|'manual'),
      seen_in_crawls[], status('active'|'paused'|'dead'), monitor bool, domain
      (nullable -> company_profiles.domain), initial_job_count, last_job_count,
      de_flag('de'|'remote'|'foreign'|null), location_signal text (raw, fuer Audit),
      sample_titles[], discovered_at, last_checked_at, enriched_at, notes.
      de_flag kommt aus ats_scanner validate (Stage B), keep-for-DE = de∪remote.
      RLS off (wie cr_companies). No-delete-Policy als Tabellen-COMMENT.
      Index (ats, status, monitor) WHERE monitor; Index (de_flag) fuer DE-Filter.
    acceptance: "list_tables zeigt ats_companies; Indizes vorhanden; COMMENT dokumentiert no-delete; de_flag-Spalte da."
    done_note: >
      Migration ats_companies_registry angewendet (project guocdgjpbvsvcvchgolm).
      PK (ats,slug), RLS off (wie cr_companies), 4 Indizes (pkey + de_flag +
      domain partial + monitor partial WHERE monitor), COMMENT = no-delete-Policy.
      monitor=true ausser status='dead'. domain = soft-link (kein FK, no-delete-decoupled).

  - id: seed-registry
    epic: ats-registry
    title: Registry seeden aus Scanner-Output
    status: done
    priority: P1
    depends_on: [ats-scanner, registry-table]
    detail: >
      scripts/seed_ats_companies.py liest enumeration-JSON (all_validations =
      Voll-Universum inkl. inaktiver Boards), idempotenter REST-upsert on (ats, slug).
      initial_job_count + discovered_at nur beim ersten Insert (update-Pfad sendet sie
      nicht -> stabil). status: active | dead (HTTP-Fehler) | paused (Feed leer).
      seen_in_crawls = File-Crawl-Set (per-slug crawls cosmetisch leer; echte Union
      = Stage-A-Folgearbeit via SQL array_cat).
    acceptance: "DONE: 8314 rows geseedet (5915 active, 1906 keep-DE), initial_job_count ueberall gesetzt; Re-Run factorial = 0 new / 222 update (idempotent)."

  - id: db-driven-slugs
    epic: ats-registry
    title: slug-Scraper lesen aktive Slugs aus ats_companies (Tabelle = SoT)
    status: done
    priority: P2
    depends_on: [registry-table, storage-gate]   # T6 vor T5: erst Title-Gate, sonst jobs-Flut bei 5915 Boards
    detail: >
      slug-basierte Scraper lesen Slugs aus ats_companies (status='active' AND
      monitor=true), Union mit portals.yaml. try/except -> yaml-only bei DB-Fehler
      (Demo/Tests bleiben gruen). Start personio.py, gleiches Muster fuer factorial,
      recruitee, greenhouse, lever, ashby, breezy.
    acceptance: "POST /scrape/personio zieht Slugs aus DB (Log: portals-count > yaml); pytest gruen."
    done_note: >
      Helper app/sources/db_slugs.py: load_active_slugs(ats) (standalone supabase
      client aus get_settings; [] bei JEDEM Fehler/leeren Creds -> yaml-Fallback) +
      merge_slugs(yaml, ats) (order-preserving Union+Dedup, Log 'N total = M yaml + K db').
      Verdrahtet in allen 7 slug-Scrapern: personio/lever/greenhouse/ashby/recruitee/breezy
      via merge_slugs(self._load_slugs(...), self.source_id); factorial via load_active_slugs
      (tuple-Shape (slug,'com'), .com-only Seed). source_id == ats-Key in allen Faellen.
      Tests: tests/sources/test_db_slugs.py (6). 3 bestehende '_returns_empty_on_no_slugs'
      Tests (breezy/recruitee/factorial) isoliert via patch load_active_slugs->[] —
      vorher schlugen sie fehl/liefen 600s+ weil .env echte Creds hat -> realer DB-Hit.
      tests/sources 61 passed in 4.3s. (Voll-Suite-1-Prozess crasht weiter nativ in
      datasketch = pre-existing, Komponenten je gruen: orchestrator+scoring+gate 24.)

  - id: storage-gate
    epic: ats-registry
    title: Title-level Storage-Gate (jobs sauber halten trotz ATS-Flut)
    status: done
    priority: P2
    depends_on: []
    detail: >
      store_threshold=0 speichert sonst ALLES. Source-local Gate (kein globaler
      threshold-Change): speichern wenn Titel keywords_positive ODER
      target_roles_primary/secondary trifft UND kein keywords_negative (aus
      scoring-profile.yaml). primary-Treffer -> priority-Flag in raw_data. Kein
      Profil geladen -> alle emittieren (Demo unveraendert). Pure fn + Unit-Test.
    acceptance: "test_title_gate: 'Agile Coach'->keep+priority, 'KI Trainer'->keep, 'Vertriebsmitarbeiter'/'Heizungsmonteur'->drop."
    done_note: >
      Pure fn app/scoring/storage_gate.py::title_gate(title, profile)->(keep, priority).
      Match-Semantik gespiegelt von keyword.py: keywords via _word_match (word-boundary),
      target_roles via Substring. Negativ-Veto zuerst; keine Positiv-Signale -> Gate aus
      (keep=True, Demo unveraendert). Verdrahtet in scrape_orchestrator: Early-Gate nach
      Dedup VOR description-resolution/MinHash/scoring (Flut-Control) -> response.jobs_gated;
      priority -> dq_flags['priority']=True (persistiert, da raw_data nicht in jobs-Schema).
      Tests: tests/test_storage_gate.py (8) gruen + MinHash-Orchestrator-Test auf
      gate-passing Titel 'AI Coach' angepasst. 200 Tests gruen (gruppiert; Voll-Suite-1-Prozess
      crasht nativ in datasketch LSH = pre-existing Windows-Flake, nicht diese Aenderung).

  - id: ats-new-providers
    epic: ats-registry
    title: Neue ATS CC-Verify (Softgarden, Teamtailor, Concludis/d.vinci/rexx/onlyfy)
    status: backlog
    priority: P2
    depends_on: [ats-scanner]
    detail: >
      Folgetask zu ats-enum-matrix (dort als STILL OPEN markiert). Je Kandidat:
      CDX-Prefix-Test (CC-enumerierbar? custom-domain -> raus) + Feed-Endpoint-Probe,
      dann Provider in PROVIDERS-Registry (ats_scanner.py) eintragen. Reihenfolge:
      Softgarden ({slug}.career.softgarden.de, Jobs-API dev.softgarden.de, DE, P1) zuerst,
      dann Teamtailor ({slug}.teamtailor.com RSS/API). Concludis/d.vinci/rexx/onlyfy
      (Prescreen) wahrscheinlich per-customer custom domains -> CDX-Test entscheidet.
      Output: docs/ats-enumerability.md erweitern (active/raw + de_flag je neuem Provider).
    acceptance: "Softgarden in PROVIDERS, --ats softgarden liefert active feeds + de_flag; Matrix-Doku erweitert; custom-domain-Kandidaten als nicht-enumerierbar dokumentiert."

  - id: softgarden-source
    epic: ats-registry
    title: Softgarden-Scraper (neue Source via Jobs-API)
    status: backlog
    priority: P2
    depends_on: [ats-new-providers, db-driven-slugs]   # braucht Softgarden-CDX-Verify + DB-Slugs
    detail: >
      Neuer Scraper @SourceRegistry.register("softgarden"), BaseScraper. Slugs aus
      ats_companies (db-driven-slugs). Jobs-API dev.softgarden.de je Slug ->
      {slug}.career.softgarden.de. Runtime-Validation Pflicht: uvicorn + curl
      POST /scrape/softgarden (nicht nur Import-Test).
    acceptance: "uvicorn hoch, POST /scrape/softgarden liefert Jobs aus >1 Slug; /health gruen."

  - id: cc-recheck-cron
    epic: ats-registry
    title: Periodischer CC-Recheck (neue Firmen ergaenzen, nie loeschen)
    status: done
    priority: P2
    depends_on: [ats-scanner, seed-registry]
    detail: >
      HTTP-Endpoint POST /scan/{stage} (app/routes/scan.py): startet ats_scanner +
      seed_ats_companies als BackgroundTask-Subprocess, 202+run_id sofort, Status in
      ats_scan_runs (GET /scan/runs). 409 wenn Lauf der stage schon laeuft (kein
      CC-Overlap). stage revalidate=Stage B (--revalidate), discover=Stage A
      (--no-validate). Optional ?ats=&limit= fuer gezielte Reruns. Consumer 'n8n'
      (api-keys.yaml, N8N_API_KEY). Getriggert via n8n cron (2 WFs, inaktiv bis
      Coolify-Key+Health gruen). NIE delete: toter Feed -> status='dead'.
    done_note: >
      Migration ats_scan_runs live (MCP). n8n WFs: Stage B daily BFfKQKCRB8F6jt4V
      (17 4 * * *), Stage A monthly nMGEo1gpoCDSmtQB (23 4 1 * *) -> POST
      discovery-engine.konektos.de/scan/{revalidate,discover}. Lokal runtime-getestet
      (401/404/409/done+seed_summary/log). OFFEN (User): N8N_API_KEY in Coolify-Env
      setzen + redeploy, Prod-/health gruen, dann WFs aktivieren.
    acceptance: "DONE: Endpoint+Tabelle+2 n8n-WFs. Aktivierung nach Coolify-Key (User-Schritt)."

  - id: progressive-enrichment
    epic: ats-registry
    title: Progressive Anreicherung der Registry-Firmen
    status: backlog
    priority: P3
    depends_on: [registry-table, db-driven-slugs]
    detail: >
      (a) aus Job-Anzeigen: Domain-Links, Location, Department -> ats_companies.
      (b) eigenes Enrichment: Hunter -> company_profiles (PK domain), domain linken,
      enriched_at setzen. Lazy/quota-aware (Hunter daily_limit 500): zuerst Firmen
      mit >=1 relevanten Job. Best-effort Domain-Resolution fuer Slugs.
    acceptance: "Firmen mit relevanten Jobs haben domain + company_profiles-Eintrag; Hunter-Quota nicht ueberschritten."
