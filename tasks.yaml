# Discovery Engine — Project-Local Task Backlog
#
# Project-internal task tracking (vs. florian-knowledge/.claude/sprint-status.yaml,
# which holds cross-project orchestration tasks). Tasks here describe work that
# changes Discovery Engine's own architecture, code, or operational model.
#
# Format mirrors florian-knowledge sprint-status.yaml:
#   id, title, size (S/M/L/XL), priority (P0-P3), status, description,
#   acceptance_criteria, isc, blocked_by (list of ids), notes (optional)
#
# See ROADMAP.md for the prose narrative behind Variant C.

backlog:

  # =========================================================================
  # Single-tenant follow-ups (small)
  # =========================================================================

  - id: "DE-FOLLOWUP-01"
    title: "JobQueryBuilder extraction + _DE_CITIES consolidation"
    size: "S"
    priority: "P2"
    status: "ready"
    created_at: "2026-05-03"
    estimate_minutes: 90
    description: |
      app/repositories/jobs.py:query() is 162 lines with 13 keyword args and
      a hardcoded _DE_CITIES dict that duplicates LocationNormalizer's
      GeoNames CSV. Extract into JobQueryBuilder (filter assembly) +
      consolidate cities into LocationNormalizer.
    acceptance_criteria:
      - "JobRepository.query reduced to <50 lines (delegating to builder)"
      - "_DE_CITIES removed from jobs.py; LocationNormalizer is single geocoding source"
      - "Existing /jobs filter tests still pass"
    isc:
      - "pytest passes with no new failures vs baseline"
      - "ruff check clean"

  - id: "DE-FOLLOWUP-02"
    title: "Pydantic schemas for sources/scoring/enrichment/archetypes YAMLs"
    size: "S"
    priority: "P3"
    status: "ready"
    created_at: "2026-05-03"
    estimate_minutes: 45
    description: |
      Currently only data-quality.yaml has a Pydantic schema (DataQualityConfig).
      sources/scoring/enrichment/archetypes load as raw dicts and are accessed
      via .get("foo", default) everywhere — defensive but not type-safe.
      Add Pydantic models, validate at startup, fail fast on bad config.
    acceptance_criteria:
      - "SourcesConfig, ScoringConfig, EnrichmentConfig, ArchetypesConfig models exist"
      - "config.load_*_config() return typed models"
      - "Bad YAML at startup -> clear ValidationError, not silent .get fallback"

  - id: "DE-FOLLOWUP-03"
    title: "Explicit registration in main.py lifespan"
    size: "S"
    priority: "P3"
    status: "ready"
    created_at: "2026-05-03"
    estimate_minutes: 30
    description: |
      Today plugin self-registration relies on side-effect imports
      (import app.sources -> __init__.py imports each module ->
      decorator side effect). Move to an explicit register_all() call
      from FastAPI lifespan so order is visible.
    acceptance_criteria:
      - "main.py lifespan calls explicit register_all_sources/scorers/enrichers"
      - "app/sources/__init__.py is empty or has only the function definition"
      - "/health still returns all registered ids"

  - id: "DE-FOLLOWUP-04"
    title: "Profile-File loading from config/scoring-profile.local.yaml"
    size: "S"
    priority: "P1"
    status: "ready"
    created_at: "2026-05-03"
    estimate_minutes: 60
    description: |
      ScrapeOrchestrator currently uses ScoringProfile(id=...) (empty default),
      which makes Stage-1 scoring profile-blind. Add: if
      config/scoring-profile.local.yaml exists, load it via Pydantic and pass
      to pipeline.run_stage1(). Pairs with the Apply Skill's onboarding flow,
      which writes that file.

      Schema example already shipped at
      config/scoring-profile.local.yaml.example.
    acceptance_criteria:
      - "ScrapeOrchestrator loads profile from local file when present"
      - "Falls back to empty profile if file absent (current behavior)"
      - "Test covers both branches"
    isc:
      - "Run with profile present: jobs are scored using the configured archetypes"
      - "Run without profile: backward compatible, no errors"

  - id: "DE-FOLLOWUP-05"
    title: "Fix test_pagination_limit_max"
    size: "S"
    priority: "P3"
    status: "done"
    completed_at: "2026-05-03"
    created_at: "2026-05-03"
    estimate_minutes: 5
    description: |
      Pre-existing test failure. test_jobs_api.py:215 expected 422 for
      limit=101, but Query(50, ge=1, le=500) allows up to 500. Updated test
      to assert le=500 boundary (limit=500 -> 200, limit=501 -> 422).
    acceptance_criteria:
      - "pytest tests/ exits 0 (118 passed)"

  # =========================================================================
  # Variant C — Multi-Tenant (BLOCKED on consumer alignment)
  # =========================================================================
  # See ROADMAP.md for prose. Sub-tasks DE-VC-01..08 are blocked until
  # DE-VC-09 (kickoff with WonderApply or another multi-tenant consumer)
  # produces a signed-off API contract.

  - id: "DE-VARIANT-C-EPIC"
    title: "[EPIC] Variant C — Multi-Tenant Discovery Engine"
    size: "XL"
    priority: "P3"
    status: "blocked"
    created_at: "2026-05-03"
    estimate_minutes: 14400  # 6-8 weeks
    description: |
      DE evolves from single-tenant to multi-tenant to support SaaS
      consumers like WonderApply. Currently all consumers share one job
      pool and one static archetypes.yaml/portals.yaml. Multi-user WA is
      structurally not possible without this work.

      EPIC is BLOCKED: implementation requires alignment with the actual
      consumer team — without it, integration will hit unanswered questions
      mid-implementation. Sub-tasks DE-VC-01..08 may not be started until
      DE-VC-09 produces:

        a) Consumer commitment (e.g. WA team) to the integration with a
           concrete, written use-case
        b) API contract co-designed (user granularity, scopes, who triggers
           scrapes per user, where the profile lives)
        c) DB strategy decided (shared jobs + junction table, vs
           per-tenant jobs partitioning vs Supabase RLS row-tagging)

      See ROADMAP.md for architecture sketch.
    acceptance_criteria:
      - "Consumer team has committed to the integration plan in writing"
      - "API contract documented: user granularity, scopes, trigger model"
      - "DB strategy chosen (shared+junction / partitioned / RLS-tagged)"
      - "Sub-tasks DE-VC-01..08 unblocked + assigned"

  - id: "DE-VC-01"
    title: "Datenmodell — tenants/end_users/user_archetypes/user_portals + RLS"
    size: "M"
    priority: "P3"
    status: "blocked"
    created_at: "2026-05-03"
    estimate_minutes: 1920  # 4 days
    description: |
      New Supabase tables: tenants, end_users, user_archetypes, user_portals,
      user_filters. jobs.user_id FK (or junction job_user_scores). Supabase
      RLS policies per table. Migration as additive-only SQL in migrations/.
    blocked_by: ["DE-VARIANT-C-EPIC"]

  - id: "DE-VC-02"
    title: "Auth — JWT mit consumer_id+user_id Claims, per-User Scopes"
    size: "M"
    priority: "P3"
    status: "blocked"
    created_at: "2026-05-03"
    estimate_minutes: 1440  # 3 days
    description: |
      Extend per-consumer-key today with per-user tokens. JWT schema with
      consumer_id + user_id. Scope model extended for per-user scopes
      (e.g. "jobs:read:own", "jobs:read:tenant"). require_scope() extended.
      Backwards-compat for apply-skill (single-user mode).
    blocked_by: ["DE-VARIANT-C-EPIC", "DE-VC-01"]

  - id: "DE-VC-03"
    title: "Profile-API zurueck — POST /profiles/sync, GET/PUT /profiles/{user_id}"
    size: "M"
    priority: "P3"
    status: "blocked"
    created_at: "2026-05-03"
    estimate_minutes: 1440  # 3 days
    description: |
      Reactivate Profile endpoints removed in Bundle B Phase 1, but now
      user-scoped. Update tests/test_removed_endpoints.py accordingly.
      Admin endpoints for catalog management (POST /admin/archetypes/{tenant_id}).
    blocked_by: ["DE-VARIANT-C-EPIC", "DE-VC-01"]

  - id: "DE-VC-04"
    title: "Orchestrator — per-User-Profile load + per-User scoring pass"
    size: "L"
    priority: "P3"
    status: "blocked"
    created_at: "2026-05-03"
    estimate_minutes: 2400  # 5 days
    description: |
      ScrapeOrchestrator.run loads profile from DB instead of empty default.
      Decide and implement: "scrape per user (N x M traffic)" vs "scrape
      globally + score per user as second pass". insert_batch tags jobs.user_id.
    blocked_by: ["DE-VARIANT-C-EPIC", "DE-VC-01", "DE-VC-03"]

  - id: "DE-VC-05"
    title: "n8n workflows — per-active-user trigger + quotas"
    size: "M"
    priority: "P3"
    status: "blocked"
    created_at: "2026-05-03"
    estimate_minutes: 960  # 2 days
    description: |
      Existing n8n cron triggers globally. New: iterate over active users,
      trigger scrape per user. Backoff/quotas per user. Failure isolation
      (1 user error doesn't stop others). Rate-limit protection for ATS APIs.
    blocked_by: ["DE-VARIANT-C-EPIC", "DE-VC-04"]

  - id: "DE-VC-06"
    title: "Admin UI — self-service onboarding for end users"
    size: "XL"
    priority: "P3"
    status: "blocked"
    created_at: "2026-05-03"
    estimate_minutes: 7200  # 15 days / 3 weeks
    description: |
      Self-service onboarding as web UI: user registers tenant/account,
      adds portals, picks archetype weights, manages profile, sees quotas.
      Otherwise it doesn't scale beyond a single operator. Stack suggestion:
      SvelteKit/Next.js + Supabase Auth.
    blocked_by: ["DE-VARIANT-C-EPIC", "DE-VC-03"]

  - id: "DE-VC-07"
    title: "Multi-tenant test suite + RLS-isolation tests"
    size: "M"
    priority: "P3"
    status: "blocked"
    created_at: "2026-05-03"
    estimate_minutes: 1920  # 4 days
    description: |
      Test suite verifying multi-tenancy: User A never sees User B's data
      via /jobs. RLS-bypass attempts fail. Quota tests. Concurrent-scrape
      isolation (no cross-user MinHash bleed).
    blocked_by: ["DE-VARIANT-C-EPIC", "DE-VC-01", "DE-VC-04"]

  - id: "DE-VC-08"
    title: "Migration — single-tenant -> first-tenant-of-multi"
    size: "S"
    priority: "P3"
    status: "blocked"
    created_at: "2026-05-03"
    estimate_minutes: 480  # 1 day
    description: |
      Migrate existing single-tenant data (all current jobs, configs) into
      the first tenant without downtime. Florian's apply-skill user becomes
      "Tenant 0 / User 0", apply-skill consumer keeps its X-API-Key path.
    blocked_by: ["DE-VARIANT-C-EPIC", "DE-VC-01", "DE-VC-04"]

  - id: "DE-VC-09"
    title: "KICKOFF — Consumer alignment + API contract sign-off"
    size: "S"
    priority: "P3"
    status: "ready"
    created_at: "2026-05-03"
    estimate_minutes: 240  # half day
    description: |
      KICKOFF task for Variant C: meeting with consumer team (e.g. WA),
      draft API contract, concretize use-case. Only after this sign-off
      do DE-VC-01..08 unblock.

      Outputs:
        - docs/api-rfc-v2.md committed in this repo
        - Consumer-team commitment archived (date, responsible parties)
        - DB-strategy decision documented
    acceptance_criteria:
      - "docs/api-rfc-v2.md committed"
      - "Consumer-team commitment archived (e-mail / Linear / GitHub issue link)"
      - "DE-VC-01 unblockable (all pre-reqs met)"
