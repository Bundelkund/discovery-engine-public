# Discovery Engine — Project-Local Task Backlog
#
# Project-internal task tracking (vs. florian-knowledge/.claude/sprint-status.yaml,
# which holds cross-project orchestration tasks). Tasks here describe work that
# changes Discovery Engine's own architecture, code, or operational model.
#
# Format mirrors florian-knowledge sprint-status.yaml:
#   id, title, size (S/M/L/XL), priority (P0-P3), status, description,
#   acceptance_criteria, isc, blocked_by (list of ids), notes (optional)
#
# See ROADMAP.md for the prose narrative behind Variant C.

backlog:

  # =========================================================================
  # Single-tenant follow-ups (small)
  # =========================================================================

  - id: "DE-FOLLOWUP-01"
    title: "JobQueryBuilder extraction + _DE_CITIES consolidation"
    size: "S"
    priority: "P2"
    status: "ready"
    created_at: "2026-05-03"
    estimate_minutes: 90
    description: |
      app/repositories/jobs.py:query() is 162 lines with 13 keyword args and
      a hardcoded _DE_CITIES dict that duplicates LocationNormalizer's
      GeoNames CSV. Extract into JobQueryBuilder (filter assembly) +
      consolidate cities into LocationNormalizer.
    acceptance_criteria:
      - "JobRepository.query reduced to <50 lines (delegating to builder)"
      - "_DE_CITIES removed from jobs.py; LocationNormalizer is single geocoding source"
      - "Existing /jobs filter tests still pass"
    isc:
      - "pytest passes with no new failures vs baseline"
      - "ruff check clean"

  - id: "DE-FOLLOWUP-02"
    title: "Pydantic schemas for sources/scoring/enrichment/archetypes YAMLs"
    size: "S"
    priority: "P3"
    status: "ready"
    created_at: "2026-05-03"
    estimate_minutes: 45
    description: |
      Currently only data-quality.yaml has a Pydantic schema (DataQualityConfig).
      sources/scoring/enrichment/archetypes load as raw dicts and are accessed
      via .get("foo", default) everywhere — defensive but not type-safe.
      Add Pydantic models, validate at startup, fail fast on bad config.
    acceptance_criteria:
      - "SourcesConfig, ScoringConfig, EnrichmentConfig, ArchetypesConfig models exist"
      - "config.load_*_config() return typed models"
      - "Bad YAML at startup -> clear ValidationError, not silent .get fallback"

  - id: "DE-FOLLOWUP-03"
    title: "Explicit registration in main.py lifespan"
    size: "S"
    priority: "P3"
    status: "ready"
    created_at: "2026-05-03"
    estimate_minutes: 30
    description: |
      Today plugin self-registration relies on side-effect imports
      (import app.sources -> __init__.py imports each module ->
      decorator side effect). Move to an explicit register_all() call
      from FastAPI lifespan so order is visible.
    acceptance_criteria:
      - "main.py lifespan calls explicit register_all_sources/scorers/enrichers"
      - "app/sources/__init__.py is empty or has only the function definition"
      - "/health still returns all registered ids"

  - id: "DE-FOLLOWUP-04"
    title: "Profile-File loading from config/scoring-profile.local.yaml"
    size: "S"
    priority: "P1"
    status: "done"
    completed_at: "2026-05-04"
    created_at: "2026-05-03"
    estimate_minutes: 60
    description: |
      ScrapeOrchestrator currently uses ScoringProfile(id=...) (empty default),
      which makes Stage-1 scoring profile-blind. Add: if
      config/scoring-profile.local.yaml exists, load it via Pydantic and pass
      to pipeline.run_stage1(). Pairs with the Apply Skill's onboarding flow,
      which writes that file.

      Schema example already shipped at
      config/scoring-profile.local.yaml.example.
    acceptance_criteria:
      - "ScrapeOrchestrator loads profile from local file when present"
      - "Falls back to empty profile if file absent (current behavior)"
      - "Test covers both branches"
    isc:
      - "Run with profile present: jobs are scored using the configured archetypes"
      - "Run without profile: backward compatible, no errors"
    notes: |
      Implemented load_scoring_profile() in app/config.py (lru_cache, lazy
      import to avoid app.scoring->app.config cycle). ScrapeOrchestrator now
      prefers the loaded profile and falls back to empty default. 4 new tests,
      full suite 122/122 passing.

  - id: "DE-FOLLOWUP-05"
    title: "Fix test_pagination_limit_max"
    size: "S"
    priority: "P3"
    status: "done"
    completed_at: "2026-05-03"
    created_at: "2026-05-03"
    estimate_minutes: 5
