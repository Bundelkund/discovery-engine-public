# Discovery Engine — Task Backlog
#
# Tracks single-tenant feature epics. (Variant-C multi-tenant is out of scope
# for this repo.) Status: backlog | in_progress | done | blocked.
# Priority: P1 (next) > P2 > P3. depends_on references task ids.

epics:
  - id: ats-registry
    title: ATS-Scanner + Multi-ATS Company-Registry (CC-fed, progressive, no-delete)
    status: backlog
    context: >
      Common-Crawl-Enumeration der Personio-Boards (495) skaliert zu einer Registry
      ALLER Unternehmen aller deutschen ATS. Eine Supabase-Tabelle erfasst jede via
      CC entdeckte ATS-Firma, wird progressiv aus Job-Anzeigen + eigenem Enrichment
      angereichert und NIE geleert — ein periodischer CC-Recheck ergaenzt nur neu
      hinzugekommene Firmen. Basis ist der generalisierte ATS-Scanner
      (aus scripts/enumerate_personio.py). Fokus zunaechst kleine DE-Anbieter (Softgarden).
    notes:
      cc_enumerable_existing_sources:
        # slug-basierte shared-host ATS — schon Source, aber nur curated yaml-Slugs;
        # CC-Scan wuerde sie massiv erweitern. Counts = ats_scanner.py first-pass
        # (2 crawls, raw unvalidated) -> docs/ats-enumerability.md.
        - personio      # {slug}.jobs.personio.de/xml  — 1018 (DE-TLD)  (validated done: 495)
        - greenhouse    # boards/job-boards.greenhouse.io/{slug} — 2785 (global)
        - ashby         # jobs.ashbyhq.com/{slug} — 1714 (global)
        - breezy        # {slug}.breezy.hr/json — 1289 (global, feed 403 to bots)
        - recruitee     # {slug}.recruitee.com/api/offers — 1286 (global)
        - factorial     # {slug}.factorialhr.com — 222 (.com only; add .de/.es)
      not_cc_enumerable_robots_blocked:
        - lever         # jobs.lever.co — robots.txt disallows crawl; CC has only robots.txt, 0 company pages
      lever_strategy: >
        DECISION RESOLVED (2026-06-07) — option (1)+(2) hybrid via TheirStack apply-link harvest,
        source='scrape' (never 'cc'). scripts/fetch_lever_theirstack.py pulls jobs.lever.co/{slug}
        apply-links from TheirStack job-search (data_source lever.co + country=DE), credit-budgeted
        (1 credit/job, free 200/mo; --max-credits guards the cap, logs coverage + truncated). Distinct
        slugs union into config/curated-slugs/lever.txt (versioned SoT, dotted slugs like valpeo.com
        kept). Then ats_scanner --slugs-file --source scrape (CDX-free list-mode, reuses validate_feed
        + de_flag) -> lever-enumeration.json -> seed_ats_companies (source honored from JSON). First run:
        49 slugs -> 41 active / 38 de seeded; load_active_slugs('lever')=41 (db-driven-slugs picks up).
        TheirStack DE-lever universe ~136 companies -> re-run fetch monthly for the tail (credits reset).
        (3) WAT link-graph mining stays P3 (only if broad coverage critical). api.lever.co feed unchanged.
      pipeline_currency: >
        Two cadences, no-delete (docs/ats-pipeline.md): Stage A discover (monthly, CC CDX
        --no-validate -> new slugs) + Stage B refresh (daily/weekly, --revalidate -> active/
        job_count/sample_titles/de_flag in ONE fetch). de_flag in {de,remote,foreign,null};
        keep-for-DE = de∪remote. Trigger: Task Scheduler / n8n cron (.claude/routines/).
      not_cc_enumerable_query_apis:
        # kein per-company Slug zum Enumerieren — Query/Aggregator-APIs.
        - adzuna
        - arbeitsagentur
        - careerjet
        - indeed
        - jooble
        - linkedin
        - themuse
        - rss
      new_ats_cc_enumerable:
        softgarden:      "{slug}.career.softgarden.de — Jobs-API dev.softgarden.de — DE, P1"
        teamtailor:      "{slug}.teamtailor.com — RSS/API — P2"
        workable:        "apply.workable.com/{slug} — API — P3"
        smartrecruiters: "careers.smartrecruiters.com/{slug} — API — P3"
        verify:          "concludis, d.vinci, rexx, onlyfy/Prescreen — custom-domain? CDX-Test noetig"

tasks:
  - id: tenant-module-integration
    title: Tenant-Modul-Anbindung — Engine bleibt agnostischer jobs-Provider (Draht-2)
    status: backlog
    priority: P1
    depends_on: []
    detail: >
      Neues Tenant-Modul (github/tenant-module, eigener Service Port 8092, eigenes
      Postgres-Schema `tenant` im Projekt guocdgjpbvsvcvchgolm) wird alleiniger Owner
      aller personenbezogenen Job-Daten (tenant.profiles / tenant.matches, loest
      public.profiles / public.user_job_data ab). Es liest neue Jobs NUR via GET /jobs
      (Draht-2, HTTP, read-only) aus dem agnostischen jobs_v2-Regal und scored je Profil.
      Engine-Pflichten: (1) jobs_v2 + GET /jobs stabil als Match-Loop-Quelle halten;
      (2) Agnostik-Invariante wahren — KEIN profile_id / kein Person-Score zurueck in die
      Engine; (3) jobs_v2-Cutover (JOBS_TABLE) so takten, dass Consumer auf Tenant-API/
      -Schema wechseln, NICHT auf anon-SQL. Engine besitzt public.profiles /
      public.user_job_data NICHT -> vom Daten-Move nicht direkt betroffen, aber
      Cutover-Sequencing mit Tenant-Live + WA-DE-07 / WA-TEN-01 abstimmen.
    acceptance: "GET /jobs + jobs_v2 als Tenant-Match-Loop-Quelle dokumentiert; kein profile_id in Engine (verify_no_profile_id.sh exit 0); Cutover-Runbook referenziert Tenant-Live."

  - id: jobs-fts-search
    title: FTS (tsvector+GIN) fuer /jobs keyword-Filter — ILIKE-Seq-Scan abloesen
    status: done
    priority: P1
    done_note: >
      DEPLOYED 2026-06-08 (live in prod). Florian gab Token-Semantik (config
      'simple') frei. Umgesetzt via EXPRESSION-GIN-Indizes statt stored column (kein
      Table-Rewrite): migrations/jobs-fts-index.sql legt gin(to_tsvector('simple',title))
      + gin(...,description) auf public.jobs UND jobs_v2 an (live appliziert).
      app/repositories/jobs.py query() keywords_positive: ILIKE -> PostgREST
      `title.wfts(simple).{term}` -> matcht die Index-Expression -> BitmapOr.
      EXPLAIN florians echte 4 Terme (agile coach/scrum master/new work/
      organisationsentwicklung), count="exact"-Form: 5403ms Seq Scan -> 252ms (~20x),
      weit unter 8s. 322 tests green, ruff clean.
      DEPLOYED: surgical Hotfix 3b4e306 auf main (mirrors feature 085b48b — NUR jobs.py-query
      + Test + Migration-Record, KEIN Overhaul) -> git push private main -> Coolify. Diff-grep
      auf JOBS_TABLE/refine/upsert leer -> kein Cutover-Impact; Live-Engine serviert weiter
      public.jobs (10513). keywords_negative + SHOULD-Filter unveraendert (positive-FTS
      verkleinert Kandidaten zuerst -> negative-ILIKE laeuft auf wenigen Rows). trgm-Indizes
      bleiben (stuetzen negative-ILIKE); spaeter prunebar.
      OFFEN Tenant-seitig (nicht Engine): TM-CAL-01 DEFAULT_THRESHOLD 40->~35 — sonst 0 matches
      trotz schneller Engine ('Senior Scrum Master'=38 < 40).
    depends_on: []
    detail: >
      Tenant live-test (2026-06-08): /jobs 500 bei Profilen mit >=4 search-terms.
      keywords_positive filtert als title/description ILIKE '%term%'. Sofort-Fix war
      pg_trgm GIN (migrations/jobs-trgm-index.sql, live appliziert) -> 4-Term-Query
      6625ms -> 3305ms, unter dem 8s statement_timeout (500 weg). ABER das Residual
      ~3.3s ist inhaerent: trgm GIN ist lossy -> der Bitmap-Heap-Recheck fuehrt ILIKE
      auf ~6000 grosse description-Texte nochmal aus (z.B. 'berater' = 52% aller
      descriptions). count="exact" via COUNT(*) OVER() + ORDER BY scraped_at DESC
      erzwingen volle Materialisierung -> count="planned" bringt hier NICHTS.
      Struktureller Sub-100ms-Fix: tsvector-Spalte (GENERATED ALWAYS, config 'german',
      title||description) + GIN auf jobs_v2; query() (app/repositories/jobs.py:~213)
      fuer keywords_positive von ILIKE auf websearch_to_tsquery/to_tsquery umbauen.
      Token-basiert -> kein Heap-Recheck.
      ACHTUNG SEMANTIK-CHANGE (Florian-Entscheid noetig, kein stiller Umbau):
      Substring -> Token. ILIKE '%berater%' trifft heute innerhalb 'Unternehmensberater';
      FTS-Token 'berater' (gestemmt) nicht. Weniger Noise, anderer Recall. Auf jobs_v2
      bauen (Zielregal), nicht v1. keywords_negative + SHOULD-Filter (location/salary/
      distance/source) bleiben unveraendert. Verzahnt mit tenant-module-integration.
    acceptance: "jobs_v2.search_tsv GENERATED + GIN-Index; query() nutzt FTS statt ILIKE fuer keywords_positive; 4-Term-Query <200ms (EXPLAIN ANALYZE); Substring->Token-Semantik mit Florian bestaetigt."

