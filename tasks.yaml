# Discovery Engine — Task Backlog
#
# Companion to ROADMAP.md (Variant-C multi-tenant lives there; this file tracks
# single-tenant feature epics). Status: backlog | in_progress | done | blocked.
# Priority: P1 (next) > P2 > P3. depends_on references task ids.

epics:
  - id: ats-registry
    title: ATS-Scanner + Multi-ATS Company-Registry (CC-fed, progressive, no-delete)
    status: backlog
    context: >
      Common-Crawl-Enumeration der Personio-Boards (495) skaliert zu einer Registry
      ALLER Unternehmen aller deutschen ATS. Eine Supabase-Tabelle erfasst jede via
      CC entdeckte ATS-Firma, wird progressiv aus Job-Anzeigen + eigenem Enrichment
      angereichert und NIE geleert — ein periodischer CC-Recheck ergaenzt nur neu
      hinzugekommene Firmen. Basis ist der generalisierte ATS-Scanner
      (aus scripts/enumerate_personio.py). Fokus zunaechst kleine DE-Anbieter (Softgarden).
    notes:
      cc_enumerable_existing_sources:
        # slug-basierte shared-host ATS — schon Source, aber nur curated yaml-Slugs;
        # CC-Scan wuerde sie massiv erweitern. Counts = ats_scanner.py first-pass
        # (2 crawls, raw unvalidated) -> docs/ats-enumerability.md.
        - personio      # {slug}.jobs.personio.de/xml  — 1018 (DE-TLD)  (validated done: 495)
        - greenhouse    # boards/job-boards.greenhouse.io/{slug} — 2785 (global)
        - ashby         # jobs.ashbyhq.com/{slug} — 1714 (global)
        - breezy        # {slug}.breezy.hr/json — 1289 (global, feed 403 to bots)
        - recruitee     # {slug}.recruitee.com/api/offers — 1286 (global)
        - factorial     # {slug}.factorialhr.com — 222 (.com only; add .de/.es)
      not_cc_enumerable_robots_blocked:
        - lever         # jobs.lever.co — robots.txt disallows crawl; CC has only robots.txt, 0 company pages
      lever_strategy: >
        Feed api.lever.co/v0/postings/{slug} works once slug known — enumeration is the
        only blocker. Slugs accrete downstream: harvest jobs.lever.co/{slug} apply-links
        from jobs found via OTHER sources + curated yaml. source='scrape'|'manual', never
        'cc'. CC WAT link-graph mining = P3 option (heavy). validate_feed already emits
        de_flag for lever via categories.location.
      pipeline_currency: >
        Two cadences, no-delete (docs/ats-pipeline.md): Stage A discover (monthly, CC CDX
        --no-validate -> new slugs) + Stage B refresh (daily/weekly, --revalidate -> active/
        job_count/sample_titles/de_flag in ONE fetch). de_flag in {de,remote,foreign,null};
        keep-for-DE = de∪remote. Trigger: Task Scheduler / n8n cron (.claude/routines/).
      not_cc_enumerable_query_apis:
        # kein per-company Slug zum Enumerieren — Query/Aggregator-APIs.
        - adzuna
        - arbeitsagentur
        - careerjet
        - indeed
        - jooble
        - linkedin
        - themuse
        - rss
      new_ats_cc_enumerable:
        softgarden:      "{slug}.career.softgarden.de — Jobs-API dev.softgarden.de — DE, P1"
        teamtailor:      "{slug}.teamtailor.com — RSS/API — P2"
        workable:        "apply.workable.com/{slug} — API — P3"
        smartrecruiters: "careers.smartrecruiters.com/{slug} — API — P3"
        verify:          "concludis, d.vinci, rexx, onlyfy/Prescreen — custom-domain? CDX-Test noetig"

tasks:
  - id: ats-scanner
    epic: ats-registry
    title: Generalisierter ATS-Scanner (provider-pluggbar) aus enumerate_personio.py
    status: done
    priority: P1
    depends_on: []
    detail: >
      scripts/ats_scanner.py — provider-pluggbar (PROVIDERS registry: cdx_domains,
      mode, feed, kind, loc). Ablauf: CC-CDX-Prefix-Search -> Slugs -> Feed-Validate
      (200 + parsebar) -> de_flag im SELBEN Fetch (loc-extractor je Provider, keine
      2. Pass). 7 Provider, 6 CC-enumerierbar (lever robots). enumerate_personio.py
      unangetastet. Feed-Fixes: breezy /json (403 war stale), factorial sitemap.xml
      (kein JSON-API). --revalidate = Feed-Re-Probe ohne CDX (Stage-B-Primitive).
    acceptance: "DONE: --ats personio reproduziert Boards; --revalidate --all liefert active+de_flag in 1 Pass; enumerate_personio.py lauffaehig."

  - id: ats-enum-matrix
    epic: ats-registry
    title: CC-Enumerierbarkeit + Feed-Endpoint je ATS verifizieren
    status: done
    priority: P1
    depends_on: []
    detail: >
      A-Liste verifiziert + feed-validiert: ~8300 raw -> 5888 active (greenhouse 2045,
      ashby 1411, recruitee 875, personio 660, breezy 756, factorial 141, lever 0).
      DE-Klassifikation: 1180 de + 744 remote-nc = 1924 keep, 3948 foreign.
      Matrix + Feed-Endpoints in docs/ats-enumerability.md, Currency in
      docs/ats-pipeline.md. STILL OPEN (eigener Task ats-new-providers): Softgarden,
      Teamtailor, Concludis/d.vinci/rexx/onlyfy CDX-Verify.
    acceptance: "DONE fuer A-Liste: docs/ats-enumerability.md + ats-pipeline.md. Neue Provider -> Folgetask."

  - id: registry-table
    epic: ats-registry
    title: Supabase-Tabelle ats_companies (no-delete Registry)
    status: done
    priority: P1
    depends_on: []
    detail: >
      Additive Migration (migrations/), via supabase-MCP anwenden. Key (ats, slug).
      Spalten: ats, slug, company_name, careers_url, feed_url, source('cc'|'scrape'|'manual'),
      seen_in_crawls[], status('active'|'paused'|'dead'), monitor bool, domain
      (nullable -> company_profiles.domain), initial_job_count, last_job_count,
      de_flag('de'|'remote'|'foreign'|null), location_signal text (raw, fuer Audit),
      sample_titles[], discovered_at, last_checked_at, enriched_at, notes.
      de_flag kommt aus ats_scanner validate (Stage B), keep-for-DE = de∪remote.
      RLS off (wie cr_companies). No-delete-Policy als Tabellen-COMMENT.
      Index (ats, status, monitor) WHERE monitor; Index (de_flag) fuer DE-Filter.
    acceptance: "list_tables zeigt ats_companies; Indizes vorhanden; COMMENT dokumentiert no-delete; de_flag-Spalte da."
    done_note: >
      Migration ats_companies_registry angewendet (project guocdgjpbvsvcvchgolm).
      PK (ats,slug), RLS off (wie cr_companies), 4 Indizes (pkey + de_flag +
      domain partial + monitor partial WHERE monitor), COMMENT = no-delete-Policy.
      monitor=true ausser status='dead'. domain = soft-link (kein FK, no-delete-decoupled).

  - id: seed-registry
    epic: ats-registry
    title: Registry seeden aus Scanner-Output
    status: done
    priority: P1
    depends_on: [ats-scanner, registry-table]
    detail: >
      scripts/seed_ats_companies.py liest enumeration-JSON (all_validations =
      Voll-Universum inkl. inaktiver Boards), idempotenter REST-upsert on (ats, slug).
      initial_job_count + discovered_at nur beim ersten Insert (update-Pfad sendet sie
      nicht -> stabil). status: active | dead (HTTP-Fehler) | paused (Feed leer).
      seen_in_crawls = File-Crawl-Set (per-slug crawls cosmetisch leer; echte Union
      = Stage-A-Folgearbeit via SQL array_cat).
    acceptance: "DONE: 8314 rows geseedet (5915 active, 1906 keep-DE), initial_job_count ueberall gesetzt; Re-Run factorial = 0 new / 222 update (idempotent)."

  - id: db-driven-slugs
    epic: ats-registry
    title: slug-Scraper lesen aktive Slugs aus ats_companies (Tabelle = SoT)
    status: backlog
    priority: P2
    depends_on: [registry-table]
    detail: >
      slug-basierte Scraper lesen Slugs aus ats_companies (status='active' AND
      monitor=true), Union mit portals.yaml. try/except -> yaml-only bei DB-Fehler
      (Demo/Tests bleiben gruen). Start personio.py, gleiches Muster fuer factorial,
      recruitee, greenhouse, lever, ashby, breezy.
    acceptance: "POST /scrape/personio zieht Slugs aus DB (Log: portals-count > yaml); pytest gruen."

  - id: storage-gate
    epic: ats-registry
    title: Title-level Storage-Gate (jobs sauber halten trotz ATS-Flut)
    status: backlog
    priority: P2
    depends_on: []
    detail: >
      store_threshold=0 speichert sonst ALLES. Source-local Gate (kein globaler
      threshold-Change): speichern wenn Titel keywords_positive ODER
      target_roles_primary/secondary trifft UND kein keywords_negative (aus
      scoring-profile.yaml). primary-Treffer -> priority-Flag in raw_data. Kein
      Profil geladen -> alle emittieren (Demo unveraendert). Pure fn + Unit-Test.
    acceptance: "test_title_gate: 'Agile Coach'->keep+priority, 'KI Trainer'->keep, 'Vertriebsmitarbeiter'/'Heizungsmonteur'->drop."

  - id: softgarden-source
    epic: ats-registry
    title: Softgarden-Scraper (neue Source via Jobs-API)
    status: backlog
    priority: P2
    depends_on: [ats-scanner, ats-enum-matrix]
    detail: >
      Neuer Scraper @SourceRegistry.register("softgarden"), BaseScraper. Slugs aus
      ats_companies (db-driven-slugs). Jobs-API dev.softgarden.de je Slug ->
      {slug}.career.softgarden.de. Runtime-Validation Pflicht: uvicorn + curl
      POST /scrape/softgarden (nicht nur Import-Test).
    acceptance: "uvicorn hoch, POST /scrape/softgarden liefert Jobs aus >1 Slug; /health gruen."

  - id: cc-recheck-cron
    epic: ats-registry
    title: Periodischer CC-Recheck (neue Firmen ergaenzen, nie loeschen)
    status: backlog
    priority: P2
    depends_on: [ats-scanner, seed-registry]
    detail: >
      Geplanter ATS-Scanner-Lauf ueber alle Provider -> upsert neuer Firmen in
      ats_companies. NIE delete: toter Feed -> status='dead', Zeile bleibt; neuer
      Slug -> insert. Trigger via n8n cron oder Task Scheduler. ROADMAP-Doku.
    acceptance: "Recheck-Lauf fuegt neue Slugs hinzu, markiert tote als 'dead', loescht keine Zeile."

  - id: progressive-enrichment
    epic: ats-registry
    title: Progressive Anreicherung der Registry-Firmen
    status: backlog
    priority: P3
    depends_on: [registry-table, db-driven-slugs]
    detail: >
      (a) aus Job-Anzeigen: Domain-Links, Location, Department -> ats_companies.
      (b) eigenes Enrichment: Hunter -> company_profiles (PK domain), domain linken,
      enriched_at setzen. Lazy/quota-aware (Hunter daily_limit 500): zuerst Firmen
      mit >=1 relevanten Job. Best-effort Domain-Resolution fuer Slugs.
    acceptance: "Firmen mit relevanten Jobs haben domain + company_profiles-Eintrag; Hunter-Quota nicht ueberschritten."
