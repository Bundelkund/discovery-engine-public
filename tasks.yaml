  - id: jobs-fts-40term-timeout
    title: GET /jobs FTS bricht bei vielen keyword-Terms am statement_timeout (Window-Truncate)
    status: backlog
    priority: P1
    context: >
      Beobachtet 2026-06-09: Tenant match_loop fetcht recency-Window 1500 (3x500 via offset)
      mit florians 40 role-Terms als keywords_positive. Pro /jobs-Request ~33% Wahrscheinlichkeit
      0 Rows -> die Query ueberschreitet das server-seitige statement_timeout (9s). Client-Retry
      (engine_client: 5xx/timeout, max 2) hilft NICHT: die Query bleibt >9s, jeder Versuch 500.
      P(alle 3 Pages ok) ~ 0.67^3 ~ 30% -> match_loop liefert oft nur 500 statt 1500 Jobs
      (oder 0 wenn Page 1 kippt) -> Tenant-Matches unterzaehlen (62 statt ~110). Verschaerft durch
      die provisorische 24->40-Term-Expansion (florian-knowledge TM-SCORE-01): mehr OR-Terms =
      groesserer FTS-Match-Set + teureres ts_rank-Sort. ANALYZE/VACUUM nach der Dedup-Migration
      half der ersten Page, aber tiefere offset-Pages bleiben grenzwertig.
    detail: >
      Hebel (einer reicht ggf.): (1) FTS-Query optimieren — keywords_positive als EIN
      tsquery (OR der Terms) statt N-fachem ILIKE/Teilausdruck; STORED search_tsv (existiert:
      idx_jobs_v2_search_tsv) konsequent nutzen; ts_rank ggf. auf Top-N begrenzen.
      (2) statement_timeout fuer den /jobs-Read-Pfad gezielt anheben (z.B. SET LOCAL
      statement_timeout=20s in der Query-Fn) — schnellster Hotfix.
      (3) Keyset-Pagination (WHERE scraped_at < cursor) statt OFFSET — tiefe OFFSETs sind teuer.
      (4) Term-Zahl deckeln/voraggregieren (haengt an TM-SCORE-01 Token-Scorer: weniger,
      praezisere Terms statt 40 Einzelwoerter).
    acceptance:
      - "GET /jobs mit 40 keywords_positive + sort=recency + offset 0/500/1000 liefert 3x 500 deterministisch (kein statement_timeout)"
      - "match_loop window=1500 fetcht reproduzierbar 1500 Jobs (nicht 0/500)"
      - "p95-Latenz /jobs Multi-Term unter dem statement_timeout dokumentiert"
